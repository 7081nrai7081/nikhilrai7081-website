<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(1120 70) scale(560)">
      <stop offset="0" stop-color="#e23a5e" stop-opacity=".16"/>
      <stop offset="1" stop-color="#e23a5e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g fill="none" stroke="#181318" stroke-opacity=".05">
    <path d="M0 157.5H1200M0 315H1200M0 472.5H1200M300 0V630M600 0V630M900 0V630"/>
  </g>

  <!-- monogram -->
  <rect x="80" y="78" width="84" height="84" rx="18" fill="#ffffff" stroke="#e23a5e" stroke-width="2.5"/>
  <text x="122" y="123" font-family="'Poppins','Segoe UI',Arial,sans-serif" font-size="38" font-weight="800" letter-spacing="-2" fill="#e23a5e" text-anchor="middle" dominant-baseline="central">NR</text>

  <!-- eyebrow -->
  <text x="82" y="280" font-family="'Poppins','Segoe UI',Arial,sans-serif" font-size="30" font-weight="700" letter-spacing="6" fill="#756f77">LEAD GENERATION</text>

  <!-- headline -->
  <g font-family="'Poppins','Segoe UI',Arial,sans-serif" font-size="70" font-weight="800" letter-spacing="-2.5">
    <text x="80" y="368" fill="#181318">Lead Gen vs</text>
    <text x="80" y="448" fill="#181318"><tspan fill="#e23a5e">Demand Gen</tspan></text>
  </g>

  <!-- subtitle -->
  <text x="82" y="540" font-family="'Poppins','Segoe UI',Arial,sans-serif" font-size="26" font-weight="500" fill="#4a444b">Create demand, then capture it — in that order</text>
</svg>
